<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORBITAL — Real-Time Satellite Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Header -->
  <header id="header">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="4" fill="var(--accent)"/>
        <ellipse cx="12" cy="12" rx="11" ry="5" stroke="var(--accent)" stroke-width="1.2" fill="none"/>
        <ellipse cx="12" cy="12" rx="11" ry="5" stroke="var(--accent)" stroke-width="1.2" fill="none" transform="rotate(60 12 12)" opacity="0.6"/>
        <ellipse cx="12" cy="12" rx="11" ry="5" stroke="var(--accent)" stroke-width="1.2" fill="none" transform="rotate(-60 12 12)" opacity="0.6"/>
      </svg>
      <span class="logo-text">ORBITAL</span>
    </div>
    <div class="header-center">
      <div class="status-bar">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">CONNECTING...</span>
      </div>
      <div class="time-display" id="utcTime">UTC 00:00:00</div>
    </div>
    <div class="header-right">
      <div class="sat-count-wrap">
        <span class="label">TRACKING</span>
        <span class="count" id="satCount">0</span>
        <span class="label">OBJECTS</span>
      </div>
    </div>
  </header>

  <!-- Canvas -->
  <canvas id="canvas"></canvas>

  <!-- Search -->
  <div class="search-container" id="searchContainer">
    <div class="search-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </div>
    <input type="text" id="searchInput" placeholder="Search satellite..." autocomplete="off" />
    <div id="searchResults" class="search-results"></div>
  </div>

  <!-- Controls -->
  <div class="controls-panel" id="controlsPanel">
    <button class="ctrl-btn" id="btnOrbits" data-active="true" title="Toggle Orbits">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(30 12 12)"/>
      </svg>
      <span>ORBITS</span>
    </button>
    <button class="ctrl-btn" id="btnLabels" data-active="false" title="Toggle Labels">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="7" width="18" height="10" rx="1"/><path d="M7 11h10M7 15h6"/>
      </svg>
      <span>LABELS</span>
    </button>
    <button class="ctrl-btn" id="btnFollow" data-active="false" title="Follow Selected">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 2L8 8H3l4 4-1.5 5.5L12 14l6.5 3.5L17 12l4-4h-5z"/>
      </svg>
      <span>FOLLOW</span>
    </button>
    <button class="ctrl-btn" id="btnRefresh" title="Refresh TLE Data">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
        <path d="M16 16h5v5"/>
      </svg>
      <span>REFRESH</span>
    </button>

    <div class="divider"></div>

    <div class="filter-group">
      <span class="filter-label">FILTER</span>
      <button class="filter-btn active" data-filter="all">ALL</button>
      <button class="filter-btn" data-filter="starlink">STARLINK</button>
      <button class="filter-btn" data-filter="iss">ISS</button>
      <button class="filter-btn" data-filter="gps">GPS</button>
      <button class="filter-btn" data-filter="weather">WEATHER</button>
    </div>
  </div>

  <!-- Satellite Info Panel -->
  <div class="info-panel" id="infoPanel">
    <div class="panel-header">
      <div class="panel-title-wrap">
        <div class="panel-icon" id="panelIcon"></div>
        <div>
          <div class="panel-sat-name" id="panelName">—</div>
          <div class="panel-norad" id="panelNorad">NORAD —</div>
        </div>
      </div>
      <button class="close-btn" id="closePanel">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="panel-badge-row" id="panelBadges"></div>

    <div class="panel-grid">
      <div class="data-cell">
        <span class="data-label">LATITUDE</span>
        <span class="data-value" id="dLat">—°</span>
      </div>
      <div class="data-cell">
        <span class="data-label">LONGITUDE</span>
        <span class="data-value" id="dLon">—°</span>
      </div>
      <div class="data-cell">
        <span class="data-label">ALTITUDE</span>
        <span class="data-value" id="dAlt">— km</span>
      </div>
      <div class="data-cell">
        <span class="data-label">VELOCITY</span>
        <span class="data-value" id="dVel">— km/s</span>
      </div>
      <div class="data-cell">
        <span class="data-label">INCLINATION</span>
        <span class="data-value" id="dInc">—°</span>
      </div>
      <div class="data-cell">
        <span class="data-label">ORBIT TYPE</span>
        <span class="data-value" id="dOrbit">—</span>
      </div>
      <div class="data-cell">
        <span class="data-label">PERIOD</span>
        <span class="data-value" id="dPeriod">— min</span>
      </div>
      <div class="data-cell">
        <span class="data-label">ECCENTRICITY</span>
        <span class="data-value" id="dEcc">—</span>
      </div>
    </div>

    <div class="tle-block">
      <div class="tle-label">TLE DATA</div>
      <div class="tle-line" id="tleLine1">—</div>
      <div class="tle-line" id="tleLine2">—</div>
    </div>

    <div class="ground-track-section">
      <div class="section-label">GROUND TRACK</div>
      <canvas id="miniMap" width="280" height="130"></canvas>
    </div>
  </div>

  <!-- Satellite List -->
  <div class="sat-list-panel" id="satListPanel">
    <div class="list-header">
      <span class="list-title">SATELLITES</span>
      <span class="list-count" id="listCount">0</span>
    </div>
    <div class="list-scroll" id="satList"></div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <canvas class="preloader-canvas" id="preloaderCanvas"></canvas>
    <div class="loading-content">
      <div class="preloader-orbit-system">
        <div class="preloader-core"></div>
        <div class="preloader-ring ring-1">
          <div class="preloader-dot dot-1"></div>
        </div>
        <div class="preloader-ring ring-2">
          <div class="preloader-dot dot-2"></div>
        </div>
        <div class="preloader-ring ring-3">
          <div class="preloader-dot dot-3"></div>
        </div>
        <div class="preloader-pulse"></div>
      </div>
      <div class="loading-brand">
        <div class="loading-text">ORBITAL</div>
        <div class="loading-byline">by Yatharth</div>
      </div>
      <div class="loading-sub" id="loadingMsg">Initializing system...</div>
      <div class="loading-progress">
        <div class="loading-bar" id="loadingBar"></div>
        <div class="loading-bar-glow" id="loadingBarGlow"></div>
      </div>
      <div class="loading-pct" id="loadingPct">0%</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Watermark -->
  <div class="watermark">by Yatharth</div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/satellite.js@4.0.0/dist/satellite.min.js"></script>
  <script src="script.js?v=2"></script>
</body>
</html>
